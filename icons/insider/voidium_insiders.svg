<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0" y="0" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="VoidiumGradientInsiders" gradientUnits="userSpaceOnUse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="16" fill="#0F0F1A"/>
  <g filter="url(#glow)">
    <path d="M30 25 L55 50 L30 75" stroke="url(#VoidiumGradientInsiders)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M55 50 L75 50" stroke="url(#VoidiumGradientInsiders)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <circle cx="75" cy="50" r="6" fill="url(#VoidiumGradientInsiders)"/>
  </g>
  <circle cx="82" cy="22" r="3" fill="#22D3EE" opacity="0.8"/>
  <circle cx="18" cy="78" r="2" fill="#A855F7" opacity="0.8"/>
  <text x="50" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#22D3EE">INSIDERS</text>
</svg>
